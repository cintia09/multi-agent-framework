name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify install script (dry run)
        run: bash install.sh --dry-run

      - name: Verify skill structure
        run: |
          # codenook-init core
          test -f skills/codenook-init/SKILL.md
          echo "✅ SKILL.md present"

          # Agent templates
          for agent in acceptor designer implementer reviewer tester; do
            test -f "skills/codenook-init/templates/${agent}.agent.md"
          done
          echo "✅ 5 agent templates present"

          # Engine template
          test -f skills/codenook-init/templates/codenook.instructions.md
          echo "✅ Engine template present"

      - name: Verify HITL scripts
        run: |
          for f in skills/codenook-init/hitl-adapters/*.sh; do
            bash -n "$f" && echo "✅ $(basename $f) syntax OK"
          done
          python3 -c "import ast; ast.parse(open('skills/codenook-init/hitl-adapters/hitl-server.py').read())"
          echo "✅ hitl-server.py syntax OK"
          echo "✅ All HITL scripts valid"

      - name: Verify VERSION
        run: |
          VERSION=$(cat VERSION)
          echo "Version: $VERSION"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo "✅ Valid semver"
