<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 660" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#059669"/></marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>
  <text x="640" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">CodeNook — workflow model</text>
  <text x="640" y="56" text-anchor="middle" font-size="13" fill="#64748b">Human issues &amp; decides · Agent executes · Nook is the agent&#8217;s workspace · Targets are what the work acts on</text>
  <rect x="40" y="90" width="190" height="500" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-dasharray="6,4"/>
  <text x="135" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Issuer · Decision-maker</text>
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="150" height="180" rx="12" fill="#ffffff" stroke="#fb923c"/>
    <circle cx="135" cy="290" r="20" fill="#fed7aa" stroke="#9a3412" stroke-width="1.5"/>
    <line x1="135" y1="310" x2="135" y2="360" stroke="#9a3412" stroke-width="2.5"/>
    <line x1="110" y1="330" x2="160" y2="330" stroke="#9a3412" stroke-width="2.5"/>
    <line x1="135" y1="360" x2="115" y2="390" stroke="#9a3412" stroke-width="2.5"/>
    <line x1="135" y1="360" x2="155" y2="390" stroke="#9a3412" stroke-width="2.5"/>
    <text x="135" y="412" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Human</text>
  </g>
  <text x="135" y="445" text-anchor="middle" font-size="11" fill="#7c2d12">📥  posts tasks</text>
  <text x="135" y="463" text-anchor="middle" font-size="11" fill="#7c2d12">✅  approves at HITL gates</text>
  <text x="135" y="481" text-anchor="middle" font-size="11" fill="#7c2d12">🎯  sets intent &amp; scope</text>
  <rect x="290" y="90" width="200" height="500" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-dasharray="6,4"/>
  <text x="390" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Executor</text>
  <g filter="url(#shadow)">
    <polygon points="320,300 360,220 420,220 460,300 420,380 360,380" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <text x="390" y="285" text-anchor="middle" font-size="32">🤖</text>
    <text x="390" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Agent</text>
    <text x="390" y="340" text-anchor="middle" font-size="11" fill="#475569">(LLM + tools)</text>
    <text x="390" y="358" text-anchor="middle" font-size="11" fill="#475569">Claude · GPT · …</text>
  </g>
  <text x="390" y="425" text-anchor="middle" font-size="11" fill="#1e40af">💬  converses with Human</text>
  <text x="390" y="443" text-anchor="middle" font-size="11" fill="#1e40af">⚙️  drives the Nook</text>
  <text x="390" y="461" text-anchor="middle" font-size="11" fill="#1e40af">🎬  acts on Targets</text>
  <rect x="550" y="90" width="420" height="500" rx="16" fill="#fefce8" stroke="#ca8a04" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="760" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#854d0e">The Nook  <tspan font-size="11" font-weight="400" fill="#92400e">(agent&#8217;s workspace)</tspan></text>
  <text x="760" y="133" text-anchor="middle" font-size="11" fill="#92400e" font-style="italic">capabilities + task state + memory</text>
  <g filter="url(#shadow)">
    <rect x="575" y="155" width="370" height="100" rx="10" fill="#ffffff" stroke="#a16207"/>
    <text x="590" y="180" font-size="14" font-weight="700" fill="#0f172a">🧩  plugins/   <tspan fill="#64748b" font-weight="400" font-size="11">— domain skill packs</tspan></text>
    <text x="590" y="204" font-size="12" fill="#334155">development  ·  writing  ·  generic</text>
    <text x="590" y="224" font-size="12" fill="#334155">roles + phases + HITL gates per domain</text>
    <text x="590" y="244" font-size="11" fill="#64748b" font-style="italic">router silently picks the right plugin per task</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="575" y="275" width="370" height="100" rx="10" fill="#ffffff" stroke="#a16207"/>
    <text x="590" y="300" font-size="14" font-weight="700" fill="#0f172a">📋  tasks/T-NNN/   <tspan fill="#64748b" font-weight="400" font-size="11">— per-task workspace</tspan></text>
    <text x="590" y="324" font-size="12" fill="#334155">state.json  ·  prompts/  ·  outputs/  ·  hitl/</text>
    <text x="590" y="344" font-size="12" fill="#334155">orchestrator-tick advances phases per the plugin</text>
    <text x="590" y="364" font-size="11" fill="#64748b" font-style="italic">tasks differ by intent, not by which target they touch</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="575" y="395" width="370" height="100" rx="10" fill="#ffffff" stroke="#a16207"/>
    <text x="590" y="420" font-size="14" font-weight="700" fill="#0f172a">🧠  memory/   <tspan fill="#64748b" font-weight="400" font-size="11">— accumulated learnings</tspan></text>
    <text x="590" y="444" font-size="12" fill="#334155">knowledge/  ·  skills/  ·  configs/  ·  index.yaml</text>
    <text x="590" y="464" font-size="12" fill="#334155">extracted post-task; deduped via fuzzy-merge</text>
    <text x="590" y="484" font-size="11" fill="#64748b" font-style="italic">grows with every completed task</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="575" y="515" width="370" height="50" rx="10" fill="#fff7ed" stroke="#ea580c"/>
    <text x="590" y="538" font-size="13" font-weight="700" fill="#0f172a">🔧  Local tools</text>
    <text x="590" y="555" font-size="11" fill="#334155">shell · git · curl · gh · docker · browser CDP · keys</text>
  </g>
  <rect x="1000" y="90" width="240" height="500" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="6,4"/>
  <text x="1120" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Targets  <tspan font-size="11" font-weight="400">(local · remote)</tspan></text>
  <text x="1015" y="140" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1.5">— LOCAL —</text>
  <g filter="url(#shadow)">
    <rect x="1015" y="148" width="210" height="62" rx="10" fill="#ecfdf5" stroke="#059669"/>
    <text x="1035" y="178" font-size="20">📂</text>
    <text x="1135" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Local project dir</text>
    <text x="1135" y="190" text-anchor="middle" font-size="11" fill="#64748b">~/code/&lt;repo&gt;  ·  notes/</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1015" y="222" width="210" height="60" rx="10" fill="#fefce8" stroke="#a16207" stroke-dasharray="3,2"/>
    <text x="1035" y="250" font-size="20">📦</text>
    <text x="1135" y="245" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f172a">…or the Nook itself</text>
    <text x="1135" y="263" text-anchor="middle" font-size="11" fill="#64748b">tasks/T-NNN/outputs/</text>
  </g>
  <text x="1015" y="310" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1.5">— REMOTE —</text>
  <g filter="url(#shadow)">
    <rect x="1015" y="318" width="210" height="60" rx="10" fill="#ecfdf5" stroke="#059669"/>
    <text x="1035" y="348" font-size="20">☁️</text>
    <text x="1135" y="343" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Remote Git Repo</text>
    <text x="1135" y="361" text-anchor="middle" font-size="11" fill="#64748b">GitHub · GitLab</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1015" y="390" width="210" height="60" rx="10" fill="#eff6ff" stroke="#2563eb"/>
    <text x="1035" y="420" font-size="20">🐳</text>
    <text x="1135" y="413" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Container workspace</text>
    <text x="1135" y="431" text-anchor="middle" font-size="11" fill="#64748b">dev container · sandbox VM</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1015" y="462" width="210" height="60" rx="10" fill="#fef2f2" stroke="#dc2626"/>
    <text x="1035" y="492" font-size="20">🧪</text>
    <text x="1135" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Test / CI / Prod</text>
    <text x="1135" y="503" text-anchor="middle" font-size="11" fill="#64748b">Actions · staging · server</text>
  </g>
  <line x1="212" y1="295" x2="318" y2="295" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arr-orange)"/>
  <rect x="218" y="280" width="98" height="14" fill="#fff7ed" opacity="0.95"/>
  <text x="267" y="291" text-anchor="middle" font-size="11" fill="#9a3412">tasks · approve</text>
  <line x1="318" y1="320" x2="212" y2="320" stroke="#fb923c" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <rect x="222" y="323" width="92" height="14" fill="#fff7ed" opacity="0.95"/>
  <text x="268" y="334" text-anchor="middle" font-size="11" fill="#9a3412">progress · ask</text>
  <line x1="468" y1="295" x2="548" y2="295" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arr-blue)" marker-start="url(#arr-blue)"/>
  <rect x="472" y="280" width="72" height="14" fill="#eff6ff" opacity="0.95"/>
  <text x="508" y="291" text-anchor="middle" font-size="11" fill="#1d4ed8">orchestrate</text>
  <line x1="948" y1="180" x2="1013" y2="180" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="952" y="165" width="58" height="14" fill="#f8fafc" opacity="0.95"/>
  <text x="981" y="176" text-anchor="middle" font-size="11" fill="#047857">read/write</text>
  <path d="M 948,252 C 970,252 990,252 1013,252" stroke="#a16207" stroke-width="1.5" stroke-dasharray="3,2" fill="none" marker-end="url(#arr-gray)"/>
  <rect x="966" y="237" width="42" height="14" fill="#fefce8" opacity="0.95"/>
  <text x="987" y="248" text-anchor="middle" font-size="10.5" fill="#854d0e">in-place</text>
  <line x1="948" y1="348" x2="1013" y2="348" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="966" y="333" width="42" height="14" fill="#f8fafc" opacity="0.95"/>
  <text x="987" y="344" text-anchor="middle" font-size="11" fill="#047857">push</text>
  <line x1="948" y1="412" x2="1013" y2="412" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="954" y="397" width="54" height="14" fill="#f8fafc" opacity="0.95"/>
  <text x="981" y="408" text-anchor="middle" font-size="11" fill="#047857">ssh / api</text>
  <line x1="948" y1="485" x2="1013" y2="485" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="950" y="470" width="62" height="14" fill="#f8fafc" opacity="0.95"/>
  <text x="981" y="481" text-anchor="middle" font-size="11" fill="#047857">deploy/test</text>
  <line x1="1013" y1="503" x2="948" y2="503" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <rect x="966" y="506" width="42" height="14" fill="#f8fafc" opacity="0.95"/>
  <text x="987" y="517" text-anchor="middle" font-size="10.5" fill="#475569">results</text>
  <g transform="translate(40, 620)">
    <rect x="0" y="0" width="1200" height="32" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <line x1="20" y1="16" x2="56" y2="16" stroke="#ea580c" stroke-width="2.2"/><text x="64" y="20" font-size="11" fill="#334155">Human ⇄ Agent dialogue (issue · approve)</text>
    <line x1="290" y1="16" x2="326" y2="16" stroke="#2563eb" stroke-width="2.4"/><text x="334" y="20" font-size="11" fill="#334155">Agent orchestrates the Nook</text>
    <line x1="540" y1="16" x2="576" y2="16" stroke="#059669" stroke-width="2"/><text x="584" y="20" font-size="11" fill="#334155">Acts on a target (read/write · push · deploy)</text>
    <line x1="900" y1="16" x2="936" y2="16" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2"/><text x="944" y="20" font-size="11" fill="#334155">Async feedback / results</text>
  </g>
</svg>