<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #6b7280; }
    .layer-label { font-size: 14px; font-weight: 600; fill: #374151; letter-spacing: 1.5px; }
    .node-label { font-size: 14px; font-weight: 600; fill: #1e293b; }
    .sub-label { font-size: 11px; font-weight: 400; fill: #6b7280; }
    .arrow-label { font-size: 11px; font-weight: 400; fill: #475569; }
    .badge { font-size: 10px; font-weight: 600; fill: #ffffff; }
    .emoji { font-size: 18px; }
    .phase-text { font-size: 10px; fill: #6b7280; font-weight: 400; }
  </style>

  <!-- Background -->
  <rect width="1100" height="780" fill="#fafbfc"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" class="title">CodeNook v4.2 — Document-Driven Multi-Agent Architecture</text>
  <text x="550" y="58" text-anchor="middle" class="subtitle">Plan → Approve → Execute → Report → Approve  |  10 Phases  |  10 HITL Gates</text>

  <!-- ═══════ Layer 1: User ═══════ -->
  <text x="30" y="100" class="layer-label">USER</text>
  <line x1="80" y1="96" x2="1070" y2="96" stroke="#e5e7eb" stroke-width="1"/>

  <!-- User circle -->
  <circle cx="550" cy="115" r="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="550" y="121" text-anchor="middle" class="emoji">👤</text>
  <text x="550" y="150" text-anchor="middle" class="node-label">Human User</text>

  <!-- Arrow: User → Orchestrator -->
  <line x1="550" y1="160" x2="550" y2="195" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ═══════ Layer 2: Orchestrator ═══════ -->
  <text x="30" y="198" class="layer-label">ENGINE</text>
  <line x1="95" y1="194" x2="1070" y2="194" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Orchestrator box (large, primary) -->
  <rect x="350" y="205" width="400" height="65" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="233" text-anchor="middle" class="node-label" fill="#1e40af">Orchestrator (Main Session)</text>
  <text x="550" y="252" text-anchor="middle" class="sub-label">Routing · Context Building · Agent Spawning · HITL Enforcement</text>

  <!-- Routing Table (left) -->
  <rect x="110" y="210" width="180" height="55" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="234" text-anchor="middle" class="node-label">Routing Table</text>
  <text x="200" y="252" text-anchor="middle" class="sub-label">10 statuses → agents</text>

  <!-- HITL Gate (right) -->
  <rect x="810" y="210" width="180" height="55" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="900" y="234" text-anchor="middle" class="node-label" fill="#991b1b">HITL Gate</text>
  <text x="900" y="252" text-anchor="middle" class="sub-label">10 approval checkpoints</text>

  <!-- Arrows: Orch ↔ Routing/HITL -->
  <line x1="350" y1="237" x2="295" y2="237" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="750" y1="237" x2="805" y2="237" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- ═══════ Layer 3: Agents ═══════ -->
  <text x="30" y="310" class="layer-label">AGENTS</text>
  <line x1="100" y1="306" x2="1070" y2="306" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Phase flow bar -->
  <rect x="70" y="320" width="960" height="200" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>

  <!-- Acceptor -->
  <rect x="100" y="345" width="150" height="70" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="175" y="370" text-anchor="middle" class="emoji">🎯</text>
  <text x="175" y="390" text-anchor="middle" class="node-label">Acceptor</text>
  <text x="175" y="405" text-anchor="middle" class="sub-label">req · accept-plan · exec</text>

  <!-- Designer -->
  <rect x="280" y="345" width="150" height="70" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="355" y="370" text-anchor="middle" class="emoji">🏗️</text>
  <text x="355" y="390" text-anchor="middle" class="node-label">Designer</text>
  <text x="355" y="405" text-anchor="middle" class="sub-label">design document</text>

  <!-- Implementer -->
  <rect x="460" y="345" width="150" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="535" y="370" text-anchor="middle" class="emoji">💻</text>
  <text x="535" y="390" text-anchor="middle" class="node-label">Implementer</text>
  <text x="535" y="405" text-anchor="middle" class="sub-label">plan + code + DFMEA</text>

  <!-- Reviewer -->
  <rect x="640" y="345" width="150" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="715" y="370" text-anchor="middle" class="emoji">🔍</text>
  <text x="715" y="390" text-anchor="middle" class="node-label">Reviewer</text>
  <text x="715" y="405" text-anchor="middle" class="sub-label">prep + review report</text>

  <!-- Tester -->
  <rect x="820" y="345" width="150" height="70" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="895" y="370" text-anchor="middle" class="emoji">🧪</text>
  <text x="895" y="390" text-anchor="middle" class="node-label">Tester</text>
  <text x="895" y="405" text-anchor="middle" class="sub-label">test plan + report</text>

  <!-- Phase flow arrows between agents -->
  <line x1="250" y1="380" x2="275" y2="380" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="430" y1="380" x2="455" y2="380" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="610" y1="380" x2="635" y2="380" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="790" y1="380" x2="815" y2="380" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Verdict feedback arrows (curved) -->
  <path d="M715,420 L715,450 Q715,470 535,470 L535,450 Q535,420 535,415" stroke="#dc2626" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="625" y="465" text-anchor="middle" class="phase-text" fill="#dc2626">CHANGES_REQUESTED</text>

  <path d="M895,420 L895,490 Q895,500 535,500 L535,470 Q535,420 535,415" stroke="#dc2626" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="715" y="497" text-anchor="middle" class="phase-text" fill="#dc2626">FAIL → impl_planned</text>

  <!-- Phase labels under flow bar -->
  <text x="175" y="530" text-anchor="middle" class="phase-text">① req_approved</text>
  <text x="355" y="530" text-anchor="middle" class="phase-text">② design_approved</text>
  <text x="535" y="530" text-anchor="middle" class="phase-text">③④ plan + execute</text>
  <text x="715" y="530" text-anchor="middle" class="phase-text">⑤⑥ plan + execute</text>
  <text x="895" y="530" text-anchor="middle" class="phase-text">⑦⑧ plan + execute</text>

  <!-- Spawn arrows from Orchestrator down to agents -->
  <path d="M450,270 L175,340" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M480,270 L355,340" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="270" x2="535" y2="340" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M620,270 L715,340" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M680,270 L895,340" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ═══════ Layer 4: Storage ═══════ -->
  <text x="30" y="570" class="layer-label">STORAGE</text>
  <line x1="110" y1="566" x2="1070" y2="566" stroke="#e5e7eb" stroke-width="1"/>

  <!-- task-board.json -->
  <rect x="100" y="585" width="200" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="610" text-anchor="middle" class="node-label">📋 task-board.json</text>
  <text x="200" y="628" text-anchor="middle" class="sub-label">Status · Goals · 10 Artifact Slots</text>

  <!-- Document Store -->
  <rect x="350" y="585" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="610" text-anchor="middle" class="node-label">📄 docs/T-NNN/</text>
  <text x="450" y="628" text-anchor="middle" class="sub-label">10 Documents per Task</text>

  <!-- Memory -->
  <rect x="600" y="585" width="200" height="60" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="610" text-anchor="middle" class="node-label">🧠 memory/</text>
  <text x="700" y="628" text-anchor="middle" class="sub-label">task-role-phase snapshots</text>

  <!-- config.json -->
  <rect x="850" y="585" width="200" height="60" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="950" y="610" text-anchor="middle" class="node-label">⚙️ config.json</text>
  <text x="950" y="628" text-anchor="middle" class="sub-label">Models · HITL · Preferences</text>

  <!-- Arrows: Orch → Storage -->
  <path d="M450,270 L200,580" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <path d="M530,270 L450,580" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <path d="M600,270 L700,580" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <path d="M700,270 L950,580" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- ═══════ Legend ═══════ -->
  <rect x="70" y="680" width="960" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="100" y1="710" x2="130" y2="710" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="140" y="714" class="arrow-label">Agent spawn</text>

  <line x1="260" y1="710" x2="290" y2="710" stroke="#9333ea" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="300" y="714" class="arrow-label">Phase flow</text>

  <line x1="410" y1="710" x2="440" y2="710" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="450" y="714" class="arrow-label">Data persistence</text>

  <line x1="590" y1="710" x2="620" y2="710" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="630" y="714" class="arrow-label">Verdict feedback loop</text>

  <rect x="800" y="700" width="14" height="14" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="820" y="714" class="arrow-label">HITL Gate</text>

  <text x="550" y="745" text-anchor="middle" class="sub-label">CodeNook v4.2 — Claude Code Only — MIT License — github.com/cintia09/CodeNook</text>
</svg>
