  <path d="M680,290 L767,485" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M750,290 L962,485" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

