  <rect x="100" y="340" width="210" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="205" y="362" text-anchor="middle" class="node-label" fill="#1e40af">Agent A</text>
  <text x="205" y="382" text-anchor="middle" class="model-text">claude-opus-4.6</text>

