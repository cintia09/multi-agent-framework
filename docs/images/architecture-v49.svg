  <text x="600" y="253" text-anchor="middle" class="node-label" fill="#1e40af">Orchestrator (Main Session)</text>
  <text x="600" y="272" text-anchor="middle" class="sub-label">Routing · Context Building · Agent Spawning · HITL Enforcement · Knowledge Extraction</text>

  <!-- Routing Table (left) -->
