  <text x="572" y="478" text-anchor="middle" class="phase-text">③④ plan + execute</text>
  <text x="767" y="478" text-anchor="middle" class="phase-text">⑤⑥ plan + execute</text>
  <text x="962" y="478" text-anchor="middle" class="phase-text">⑦⑧ plan + execute</text>

