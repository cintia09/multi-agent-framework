<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" width="1200" height="920">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <linearGradient id="dualGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #6b7280; }
    .layer-label { font-size: 14px; font-weight: 600; fill: #374151; letter-spacing: 1.5px; }
    .node-label { font-size: 14px; font-weight: 600; fill: #1e293b; }
    .sub-label { font-size: 11px; font-weight: 400; fill: #6b7280; }
    .arrow-label { font-size: 11px; font-weight: 400; fill: #475569; }
    .badge { font-size: 10px; font-weight: 600; fill: #ffffff; }
    .emoji { font-size: 18px; }
    .phase-text { font-size: 10px; fill: #6b7280; font-weight: 400; }
    .model-text { font-size: 9px; fill: #9ca3af; font-weight: 400; font-style: italic; }
    .feature-badge { font-size: 9px; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="1200" height="920" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" class="title">CodeNook v4.9 — Document-Driven Multi-Agent Architecture</text>
  <text x="600" y="58" text-anchor="middle" class="subtitle">Plan → Approve → Execute → Report → Approve  |  10 Phases  |  10 HITL Gates  |  Dual-Agent Cross-Examination</text>

  <!-- Platform badges -->
  <rect x="420" y="66" width="100" height="18" rx="9" fill="#2563eb"/>
  <text x="470" y="79" text-anchor="middle" class="badge">Claude Code</text>
  <rect x="530" y="66" width="90" height="18" rx="9" fill="#7c3aed"/>
  <text x="575" y="79" text-anchor="middle" class="badge">Copilot CLI</text>
  <rect x="630" y="66" width="55" height="18" rx="9" fill="#16a34a"/>
  <text x="657" y="79" text-anchor="middle" class="badge">MIT</text>

  <!-- ═══════ Layer 1: User ═══════ -->
  <text x="30" y="120" class="layer-label">USER</text>
  <line x1="80" y1="116" x2="1170" y2="116" stroke="#e5e7eb" stroke-width="1"/>

  <!-- User circle -->
