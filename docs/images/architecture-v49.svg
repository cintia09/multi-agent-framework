  <text x="767" y="535" text-anchor="middle" class="node-label">Reviewer</text>
  <text x="767" y="550" text-anchor="middle" class="sub-label">prep + review report</text>
  <text x="767" y="563" text-anchor="middle" class="model-text">gpt-5.4</text>

