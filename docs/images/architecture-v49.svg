  <text x="1030" y="249" text-anchor="middle" class="node-label" fill="#991b1b">HITL Gate</text>
  <text x="1030" y="264" text-anchor="middle" class="sub-label">10 approval checkpoints</text>
  <text x="1030" y="278" text-anchor="middle" class="phase-text">local-html · terminal · github · confluence</text>

