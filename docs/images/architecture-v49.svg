  <path d="M767,575 L767,610 Q767,625 572,625 L572,600 Q572,580 572,575" stroke="#dc2626" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="670" y="622" text-anchor="middle" class="phase-text" fill="#dc2626">CHANGES_REQUESTED</text>

  <path d="M962,575 L962,640 Q962,650 572,650 L572,610 Q572,580 572,575" stroke="#dc2626" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="770" y="648" text-anchor="middle" class="phase-text" fill="#dc2626">FAIL → impl_planned</text>

  <!-- Phase labels -->
