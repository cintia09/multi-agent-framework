<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14">
  <!-- CodeNook v0.14.0 architecture - 4-layer C4-style view.
       Layers (top-down): User session / Per-workspace runtime / Kernel / Plugins.
       v0.14 changes vs v0.11: Python installer (install.py) + Python CLI shim
       (.codenook/bin/codenook) replace the bash wrapper; three first-party plugins. -->
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#444"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#2c5d87"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f7a4a"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#b45309"/>
    </marker>
  </defs>
  <style>
    .layer-title  { font-size: 16px; font-weight: 700; fill: #1f2937; }
    .layer-sub    { font-size: 12px; fill: #6b7280; }
    .box-title    { font-size: 14px; font-weight: 700; fill: #1f2937; }
    .box-sub      { font-size: 12px; fill: #4b5563; }
    .small        { font-size: 11px; fill: #6b7280; }
    .badge        { font-size: 11px; font-weight: 700; fill: #ffffff; }
    .arrow-label  { font-size: 11px; fill: #374151; }
    .new-tag      { font-size: 10px; font-weight: 700; fill: #b45309; }
  </style>
  <rect x="0" y="0" width="1200" height="1280" fill="#fafafa"/>
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">CodeNook v0.14.0 - Plugin Architecture</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#6b7280">Kernel + per-workspace runtime + read-only plugins. Python installer/CLI; bash dependency removed.</text>
  <rect x="40" y="90" width="1120" height="120" rx="10" ry="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="60" y="114" class="layer-title">1. User session</text>
  <text x="60" y="132" class="layer-sub">Claude Code / Copilot CLI - the conductor reads CLAUDE.md bootloader and relays opaque envelopes.</text>
  <rect x="80" y="148" width="240" height="46" rx="6" ry="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="168" text-anchor="middle" class="box-title">User</text>
  <text x="200" y="185" text-anchor="middle" class="box-sub">natural-language turn</text>
  <rect x="380" y="148" width="320" height="46" rx="6" ry="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="540" y="168" text-anchor="middle" class="box-title">Main session (conductor)</text>
  <text x="540" y="185" text-anchor="middle" class="box-sub">CLAUDE.md bootloader - opaque relay</text>
  <rect x="760" y="148" width="360" height="46" rx="6" ry="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="940" y="168" text-anchor="middle" class="box-title">Sub-agents (router / phase / extractor)</text>
  <text x="940" y="185" text-anchor="middle" class="box-sub">isolated context per dispatch</text>
  <line x1="320" y1="171" x2="378" y2="171" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="171" x2="758" y2="171" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="240" width="1120" height="320" rx="10" ry="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="60" y="264" class="layer-title">2. Per-workspace runtime  -  &lt;ws&gt;/.codenook/</text>
  <text x="60" y="282" class="layer-sub">Self-contained: every workspace owns its kernel copy, plugins, memory, tasks, and a Python CLI shim.</text>
  <rect x="80" y="298" width="260" height="76" rx="8" ry="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <rect x="80" y="298" width="42" height="18" rx="4" ry="4" fill="#b45309"/>
  <text x="101" y="311" text-anchor="middle" class="badge">NEW</text>
  <text x="210" y="330" text-anchor="middle" class="box-title">.codenook/bin/codenook</text>
  <text x="210" y="348" text-anchor="middle" class="box-sub">Python shim (POSIX + .cmd)</text>
  <text x="210" y="364" text-anchor="middle" class="small">task / router / tick / hitl / decide / status / chain</text>
  <rect x="370" y="298" width="260" height="76" rx="8" ry="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="500" y="322" text-anchor="middle" class="box-title">codenook-core/  (kernel copy)</text>
  <text x="500" y="340" text-anchor="middle" class="box-sub">staged at install time</text>
  <text x="500" y="358" text-anchor="middle" class="small">no dependency on source-repo path</text>
  <rect x="660" y="298" width="220" height="76" rx="8" ry="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="770" y="322" text-anchor="middle" class="box-title">CLAUDE.md</text>
  <text x="770" y="340" text-anchor="middle" class="box-sub">bootloader block</text>
  <text x="770" y="358" text-anchor="middle" class="small">codenook:begin / codenook:end markers</text>
  <rect x="910" y="298" width="210" height="76" rx="8" ry="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="1015" y="322" text-anchor="middle" class="box-title">state.json + schemas/</text>
  <text x="1015" y="340" text-anchor="middle" class="box-sub">model catalog + config</text>
  <text x="1015" y="358" text-anchor="middle" class="small">JSON schemas for validators</text>
  <rect x="80" y="394" width="500" height="146" rx="8" ry="8" fill="#ffffff" stroke="#0f7a4a" stroke-width="1.5"/>
  <text x="100" y="416" class="box-title">plugins/&lt;id&gt;/  (read-only, atomic-committed)</text>
  <text x="100" y="434" class="box-sub">plugin.yaml | phases.yaml | transitions.yaml | hitl-gates.yaml | roles/ | prompts/ | validators/</text>
  <rect x="100" y="452" width="130" height="74" rx="6" ry="6" fill="#f9fafb" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="165" y="474" text-anchor="middle" class="box-title" fill="#7c3aed">development</text>
  <text x="165" y="494" text-anchor="middle" class="small">8-phase SE pipeline</text>
  <text x="165" y="510" text-anchor="middle" class="small">clarify-design-plan-...</text>
  <rect x="250" y="452" width="130" height="74" rx="6" ry="6" fill="#f9fafb" stroke="#2c5d87" stroke-width="1.5"/>
  <text x="315" y="474" text-anchor="middle" class="box-title" fill="#2c5d87">generic</text>
  <text x="315" y="494" text-anchor="middle" class="small">lightweight default</text>
  <text x="315" y="510" text-anchor="middle" class="small">any domain</text>
  <rect x="400" y="452" width="130" height="74" rx="6" ry="6" fill="#f9fafb" stroke="#b45309" stroke-width="1.5"/>
  <text x="465" y="474" text-anchor="middle" class="box-title" fill="#b45309">writing</text>
  <text x="465" y="494" text-anchor="middle" class="small">long-form authoring</text>
  <text x="465" y="510" text-anchor="middle" class="small">draft-revise-publish</text>
  <rect x="610" y="394" width="240" height="146" rx="8" ry="8" fill="#ffffff" stroke="#0f7a4a" stroke-width="1.5"/>
  <text x="630" y="416" class="box-title">memory/</text>
  <text x="630" y="436" class="small">knowledge/&lt;topic&gt;.md  (LLM-judged)</text>
  <text x="630" y="454" class="small">skills/&lt;name&gt;/  (reusable)</text>
  <text x="630" y="472" class="small">config.yaml  (entries[] log)</text>
  <text x="630" y="490" class="small">history/extraction-log.jsonl</text>
  <text x="630" y="518" class="small" font-style="italic">Caps: 3 knowledge + 1 skill + 5 cfg / task</text>
  <rect x="880" y="394" width="240" height="146" rx="8" ry="8" fill="#ffffff" stroke="#0f7a4a" stroke-width="1.5"/>
  <text x="900" y="416" class="box-title">tasks/&lt;T-NNN&gt;/</text>
  <text x="900" y="436" class="small">state.json  (phase, verdict, retry)</text>
  <text x="900" y="454" class="small">outputs/phase-N-&lt;role&gt;.md</text>
  <text x="900" y="472" class="small">.router-prompt.md  (rendered)</text>
  <text x="900" y="490" class="small">audit/  (dispatch + extract logs)</text>
  <text x="900" y="518" class="small" font-style="italic">DAG of parents (Jaccard top-3)</text>
  <rect x="40" y="590" width="1120" height="350" rx="10" ry="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="60" y="614" class="layer-title">3. Kernel  -  skills/codenook-core/</text>
  <text x="60" y="632" class="layer-sub">Domain-agnostic: routing / orchestration / memory / install (12 gates) / config &amp; models / helpers.</text>
  <rect x="80" y="650" width="240" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="80" y="650" width="42" height="18" rx="4" ry="4" fill="#b45309"/>
  <text x="101" y="663" text-anchor="middle" class="badge">NEW</text>
  <text x="200.0" y="674" text-anchor="middle" class="box-title">Python installer</text>
  <text x="200.0" y="694" text-anchor="middle" class="small">_lib/install/cli.py</text>
  <text x="200.0" y="710" text-anchor="middle" class="small">stage_kernel.py</text>
  <text x="200.0" y="726" text-anchor="middle" class="small">stage_plugins.py</text>
  <text x="200.0" y="742" text-anchor="middle" class="small">seed_workspace.py</text>
  <text x="200.0" y="758" text-anchor="middle" class="small">install.py  (entrypoint)</text>
  <rect x="340" y="650" width="240" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="340" y="650" width="42" height="18" rx="4" ry="4" fill="#b45309"/>
  <text x="361" y="663" text-anchor="middle" class="badge">NEW</text>
  <text x="460.0" y="674" text-anchor="middle" class="box-title">Python CLI dispatch</text>
  <text x="460.0" y="694" text-anchor="middle" class="small">_lib/cli/app.py</text>
  <text x="460.0" y="710" text-anchor="middle" class="small">cmd_task / cmd_router / cmd_tick</text>
  <text x="460.0" y="726" text-anchor="middle" class="small">cmd_decide / cmd_hitl</text>
  <text x="460.0" y="742" text-anchor="middle" class="small">cmd_status / cmd_chain</text>
  <text x="460.0" y="758" text-anchor="middle" class="small">forwards from bin/codenook</text>
  <rect x="600" y="650" width="240" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="720.0" y="674" text-anchor="middle" class="box-title">Routing</text>
  <text x="720.0" y="694" text-anchor="middle" class="small">router-agent</text>
  <text x="720.0" y="710" text-anchor="middle" class="small">router-context-scan</text>
  <text x="720.0" y="726" text-anchor="middle" class="small">router-dispatch-build</text>
  <text x="720.0" y="742" text-anchor="middle" class="small">parent_suggester (Jaccard top-3)</text>
  <text x="720.0" y="758" text-anchor="middle" class="small">chain_summarize (2-pass LLM)</text>
  <rect x="860" y="650" width="260" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="990.0" y="674" text-anchor="middle" class="box-title">Orchestration</text>
  <text x="990.0" y="694" text-anchor="middle" class="small">orchestrator-tick</text>
  <text x="990.0" y="710" text-anchor="middle" class="small">dispatch-audit</text>
  <text x="990.0" y="726" text-anchor="middle" class="small">hitl-adapter (terminal | html)</text>
  <text x="990.0" y="742" text-anchor="middle" class="small">queue-runner</text>
  <text x="990.0" y="758" text-anchor="middle" class="small">session-resume</text>
  <rect x="80" y="790" width="320" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="240.0" y="814" text-anchor="middle" class="box-title">Plugin install (12 gates: G01-G12)</text>
  <text x="240.0" y="834" text-anchor="middle" class="small">install-orchestrator</text>
  <text x="240.0" y="850" text-anchor="middle" class="small">plugin-format / -schema / -id-validate</text>
  <text x="240.0" y="866" text-anchor="middle" class="small">plugin-version-check / -signature</text>
  <text x="240.0" y="882" text-anchor="middle" class="small">plugin-deps-check / -subsystem-claim</text>
  <text x="240.0" y="898" text-anchor="middle" class="small">plugin-shebang-scan / -path-normalize / sec-audit</text>
  <rect x="420" y="790" width="280" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="560.0" y="814" text-anchor="middle" class="box-title">Memory / extraction</text>
  <text x="560.0" y="834" text-anchor="middle" class="small">extractor-batch (after_phase)</text>
  <text x="560.0" y="850" text-anchor="middle" class="small">knowledge-extractor</text>
  <text x="560.0" y="866" text-anchor="middle" class="small">skill-extractor</text>
  <text x="560.0" y="882" text-anchor="middle" class="small">config-extractor</text>
  <text x="560.0" y="898" text-anchor="middle" class="small">distiller (workspace promotion)</text>
  <rect x="720" y="790" width="200" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="820.0" y="814" text-anchor="middle" class="box-title">Config &amp; models</text>
  <text x="820.0" y="834" text-anchor="middle" class="small">config-resolve / -validate</text>
  <text x="820.0" y="850" text-anchor="middle" class="small">config-mutator</text>
  <text x="820.0" y="866" text-anchor="middle" class="small">model-probe</text>
  <text x="820.0" y="882" text-anchor="middle" class="small">secrets-resolve</text>
  <text x="820.0" y="898" text-anchor="middle" class="small">task-config-set / preflight</text>
  <rect x="940" y="790" width="180" height="130" rx="8" ry="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="1030.0" y="814" text-anchor="middle" class="box-title">Helpers (_lib/)</text>
  <text x="1030.0" y="834" text-anchor="middle" class="small">task_chain / memory_layer</text>
  <text x="1030.0" y="850" text-anchor="middle" class="small">memory_index / llm_call</text>
  <text x="1030.0" y="866" text-anchor="middle" class="small">render_prompt / token_estimate</text>
  <text x="1030.0" y="882" text-anchor="middle" class="small">workspace_overlay</text>
  <text x="1030.0" y="898" text-anchor="middle" class="small">claude_md_linter / sec_scan</text>
  <rect x="40" y="970" width="1120" height="190" rx="10" ry="10" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="60" y="994" class="layer-title">4. First-party plugins  -  plugins/  (source repo)</text>
  <text x="60" y="1012" class="layer-sub">Self-contained directories shipped in this repo; install.py copies them into &lt;ws&gt;/.codenook/plugins/&lt;id&gt;/.</text>
  <rect x="80" y="1032" width="340" height="106" rx="8" ry="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="250" y="1056" text-anchor="middle" class="box-title" fill="#7c3aed">plugins/development/</text>
  <text x="250" y="1078" text-anchor="middle" class="small">clarify -> design -> plan -> implement -> test -> accept -> validate -> ship</text>
  <text x="250" y="1098" text-anchor="middle" class="small">8 roles, criteria-*.md, pytest post-validators</text>
  <text x="250" y="1120" text-anchor="middle" class="small" font-style="italic">plugin.yaml + phases.yaml + transitions.yaml + roles/ + prompts/ + validators/</text>
  <rect x="440" y="1032" width="340" height="106" rx="8" ry="8" fill="#ffffff" stroke="#2c5d87" stroke-width="1.5"/>
  <text x="610" y="1056" text-anchor="middle" class="box-title" fill="#2c5d87">plugins/generic/</text>
  <text x="610" y="1078" text-anchor="middle" class="small">lightweight 3-phase pipeline for any domain</text>
  <text x="610" y="1098" text-anchor="middle" class="small">minimal HITL gates, fast turnaround</text>
  <text x="610" y="1120" text-anchor="middle" class="small" font-style="italic">plugin.yaml + phases.yaml + transitions.yaml + roles/ + prompts/ + validators/</text>
  <rect x="800" y="1032" width="340" height="106" rx="8" ry="8" fill="#ffffff" stroke="#b45309" stroke-width="1.5"/>
  <text x="970" y="1056" text-anchor="middle" class="box-title" fill="#b45309">plugins/writing/</text>
  <text x="970" y="1078" text-anchor="middle" class="small">draft -> revise -> publish (long-form authoring)</text>
  <text x="970" y="1098" text-anchor="middle" class="small">role profiles for writer / editor / reviewer</text>
  <text x="970" y="1120" text-anchor="middle" class="small" font-style="italic">plugin.yaml + phases.yaml + transitions.yaml + roles/ + prompts/ + validators/</text>
